name: Test FlakyGuard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint & build the action itself ──────────────────────────────────────
  build:
    name: Build action bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build dist bundle
        run: npm run build

      - name: Verify dist was produced
        run: test -f dist/index.js && echo "dist/index.js OK"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── 2. Integration test against a real Maven project ──────────────────────
  integration:
    name: Integration test (Maven + JUnit)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Create a minimal Maven project with one intentionally flaky test
      - name: Scaffold sample Maven project
        run: |
          mkdir -p sample/src/test/java/com/example
          cat > sample/pom.xml << 'EOF'
          <project>
            <modelVersion>4.0.0</modelVersion>
            <groupId>com.example</groupId>
            <artifactId>sample</artifactId>
            <version>1.0-SNAPSHOT</version>
            <dependencies>
              <dependency>
                <groupId>junit</groupId>
                <artifactId>junit</artifactId>
                <version>4.13.2</version>
                <scope>test</scope>
              </dependency>
            </dependencies>
          </project>
          EOF

          # A test that fails ~50 % of the time based on system time parity
          cat > sample/src/test/java/com/example/FlakyTest.java << 'EOF'
          package com.example;
          import org.junit.Test;
          import static org.junit.Assert.*;

          public class FlakyTest {
              @Test
              public void stableTest() { assertTrue(true); }

              @Test
              public void flakyTest() {
                  // Fails when the current millisecond is odd
                  assertTrue("Flaky timing failure", System.currentTimeMillis() % 2 == 0);
              }
          }
          EOF

      - name: Run FlakyGuard on sample project
        uses: ./
        with:
          test-command: 'mvn test -f sample/pom.xml -B'
          runs: 4
          on-flaky: 'warn'
          github-token: ${{ secrets.GITHUB_TOKEN }}
        # The step is allowed to warn without failing CI
        continue-on-error: true
